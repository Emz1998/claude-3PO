name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: false
        type: string
        default: "1"
      pr_body:
        description: "PR body (paste anything for manual testing)"
        required: false
        type: string
        default: "THIS IS A TEST. NO PR BODY"
      test_mode:
        description: "Test mode"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: Hello claude!
