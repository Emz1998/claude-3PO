name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: false
        type: string
        default: "1"
      pr_body:
        description: "PR body (paste anything for manual testing)"
        required: false
        type: string
        default: "THIS IS A TEST. NO PR BODY"
      test_mode:
        description: "Test mode"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex
        id: install_codex
        run: npm i -g @openai/codex

      - name: Login Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Run Review Script
        id: review_script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_CONTENT: ${{ github.event.pull_request.body || inputs.pr_body }}
          TEST_MODE: ${{ inputs.test_mode }}

        run: python3 .claude/scripts/codex_review.py
