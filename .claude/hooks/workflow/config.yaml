paths:
  base: "project"
  sprints: "project/sprints"
  state_dir: "/home/emhar/avaris-ai/.claude/hooks/workflow/states"
  workflow_state: "/home/emhar/avaris-ai/.claude/hooks/workflow/state.json"
  validation_log: "/home/emhar/avaris-ai/.claude/hooks/workflow/validation.log"
  plans_dir: "~/.claude/plans"
  templates_reminders: ".claude/hooks/workflow/templates/reminders"

agents:
  pre_coding: ["Explore", "Plan", "plan-reviewer"]
  test: ["test-engineer", "test-reviewer"]

phases:
  workflow: ["pre-coding", "code", "review", "final-commit", "validate", "push"]

  review: ["review", "refactor"]

validation:
  iteration_loop: 3
  confidence_score: 70
  quality_score: 70
  ci_max_iterations: 2

reminders:
  map:
    - event: "PostToolUse"
      tool: "EnterPlanMode"
      agent: null
      template: "pre_coding_phase.md"
    - event: "PostToolUse"
      tool: "Agent"
      agent: "Plan"
      template: "plan_review.md"
    - event: "PostToolUse"
      tool: "ExitPlanMode"
      agent: null
      template: "coding_phase.md"
    - event: "PostToolUse"
      tool: "Agent"
      agent: "test-engineer"
      template: "test_review.md"
    - event: "PreToolUse"
      tool: "Agent"
      agent: "code-reviewer"
      template: "code-reviewer.md"
    - event: "PostToolUse"
      tool: "Skill"
      skill: "simplify"
      template: "simplify.md"

sessions_dir: ".claude/sessions"

session_dirs:
  ["exploration", "planning", "review", "testing", "troubleshooting", "reports"]

commands:
  - "pr-create": "gh pr create"
  - "pr-merge": "gh pr merge"
  - "pr-close": "gh pr close"
  - "pr-reopen": "gh pr reopen"
  - "pr-comment": "gh pr comment"
  - "pr-review": "gh pr review"
  - "pr-review-request": "gh pr review-request"
  - "commit": "git commit"
  - "push": "git push"
  -
