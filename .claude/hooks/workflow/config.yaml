paths:
  base: "project"
  sprints: "project/sprints"
  workflow_state: "/home/emhar/avaris-ai/.claude/hooks/workflow/state.json"
  validation_log: "/home/emhar/avaris-ai/.claude/hooks/workflow/validation.log"
  plans_dir: "~/.claude/plans"
  templates_reminders: ".claude/hooks/workflow/templates/reminders"

agents:
  pre_coding: ["Explore", "Plan", "plan-reviewer"]
  test: ["test-engineer", "test-reviewer"]
  code: ["simplify", "code-reviewer"]

phases:
  workflow:
    [
      "pre-coding",
      "code",
      "simplify",
      "review",
      "final-commit",
      "validate",
      "push",
    ]
  review: ["review", "refactor"]

validation:
  iteration_loop: 3
  confidence_score: 70
  quality_score: 70

reminders:
  map:
    - event: "PostToolUse"
      tool: "EnterPlanMode"
      agent: null
      template: "pre_coding_phase.md"
    - event: "PostToolUse"
      tool: "Agent"
      agent: "Plan"
      template: "plan_review.md"
    - event: "PostToolUse"
      tool: "ExitPlanMode"
      agent: null
      template: "coding_phase.md"
    - event: "PostToolUse"
      tool: "Agent"
      agent: "test-engineer"
      template: "test_review.md"
    - event: "PreToolUse"
      tool: "Agent"
      agent: "code-reviewer"
      template: "code-reviewer.md"

session_dirs:
  ["exploration", "planning", "review", "testing", "troubleshooting", "reports"]
