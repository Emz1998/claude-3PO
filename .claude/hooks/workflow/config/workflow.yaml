# .claude/hooks/config/workflow.yaml

phases:
  - name: planning
    allowed_tools: [Read, Glob, Grep, Task]
    allowed_subagents: [architect, researcher]
    required_before_next: [Read] # Must read at least once

  - name: implementation
    allowed_tools: [Read, Write, Edit, Bash, Task]
    allowed_subagents: [coder, tester]
    requires_phase: planning

  - name: testing
    allowed_tools: [Read, Bash, Task]
    allowed_subagents: [tester]
    requires_phase: implementation

  - name: review
    allowed_tools: [Read, Glob, Grep]
    allowed_subagents: []
    requires_phase: testing

subagent_order:
  - architect
  - researcher
  - coder
  - tester

stop_conditions:
  require_tools_used: [Write, Bash] # Must have written something
  require_phase: implementation # At least reached this phase
