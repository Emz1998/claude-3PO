# WORKFLOW CONFIGURATION
# This file controls all workflow behavior. Non-technical users can safely edit this file.
# Uses simple wildcard patterns: * matches any characters, ** matches directories

# =============================================================================
# PROJECT SETTINGS
# =============================================================================
project:
  name: "Avaris - NBA Betting Analytics Platform"
  version: "v0.1.0"
  target_release: "2025-01-15"

# =============================================================================
# WORKFLOW PHASES - The steps that must be completed in order
# =============================================================================
phases:
  # Standard workflow (with placeholder "code" that expands based on test strategy)
  base:
    - explore # Understand codebase
    - plan # Create plan
    - plan-consult # Review plan
    - finalize-plan # Finalize plan
    - code # Implementation (expands to TDD or test-after phases)
    - commit # Commit changes

  # Simple workflow without TDD
  simple:
    - explore # Understand codebase
    - plan # Create plan
    - execute # Execute plan
    - commit # Commit changes

  # TDD phases (replace "code" when using TDD strategy)
  tdd:
    - write-tests # Write failing tests first
    - review-tests # Review test quality
    - write-code # Implement to pass tests
    - code-review # Review code quality
    - refactor # Improve code
    - validate # Final validation

  # Test-after phases (replace "code" when writing tests after)
  test-after:
    - write-code # Write code first
    - write-tests # Write tests after
    - review-tests # Review test quality
    - code-review # Review code quality
    - refactor # Improve code
    - validate # Final validation

# =============================================================================
# TRIGGERS - Commands that activate/deactivate the workflow
# =============================================================================
triggers:
  implement:
    command: "/implement"
    arg_pattern: "T\\d{3}(\\s*-\\s*T\\d{3})?$"
    arg_hint: "TNNN"
    description: "Activate workflow and begin implementation"
  deactivate:
    command: "/deactivate-workflow"
    description: "Deactivate the workflow"
  dry_run:
    command: "/dry-run"
    description: "Activate dry-run mode"
  troubleshoot:
    command: "/troubleshoot"
    description: "Enter troubleshoot mode (bypasses coding phases)"

# =============================================================================
# BYPASS PHASES - Phases that can skip normal ordering
# =============================================================================
bypass_phases:
  troubleshoot:
    can_bypass:
      - write-tests
      - review-tests
      - write-code
      - code-review
      - refactor
      - validate
      - commit
    cannot_bypass:
      - explore
      - plan
      - plan-consult
      - finalize-plan

# =============================================================================
# AGENTS - Who handles each phase
# =============================================================================
agents:
  explore: codebase-explorer
  plan: planner
  plan-consult: plan-consultant
  finalize-plan: planner
  execute: main-agent
  commit: version-manager
  write-tests: test-engineer
  review-tests: test-reviewer
  write-code: main-agent
  code-review: code-reviewer
  refactor: main-agent
  validate: validator
  troubleshoot: troubleshooter

# =============================================================================
# DELIVERABLES - Required inputs/outputs for each phase
# Uses simple wildcards: * matches any characters, ** matches directories
# Placeholders: {project} = current feature path, {session} = session ID
# Prefix with ./ for exact match from repo root (e.g., ./prompt.md)
# =============================================================================
deliverables:
  explore:
    # Files to read before starting
    read:
      - filepath: "./prompt.md"
        description: "User's requirements"
        strict_order: 1
    # Files to create/write
    write:
      - filepath: "{project}/codebase-status/codebase-status_{session}.md"
        description: "Codebase analysis report"

  plan:
    read:
      - filepath: "{project}/codebase-status/codebase-status_{session}.md"
        description: "Codebase analysis from explore phase"
        strict_order: 1
    write:
      - filepath: "{project}/plans/initial-plan_{session}.md"
        description: "Initial implementation plan"

  plan-consult:
    read:
      - filepath: "{project}/plans/initial-plan_{session}.md"
        description: "Initial plan to review"
        strict_order: 1
    write:
      - filepath: "{project}/plans/plan-consultation_{session}.md"
        description: "Plan consultation feedback"

  finalize-plan:
    read:
      - filepath: "{project}/plans/plan-consultation_{session}.md"
        description: "Consultation feedback to incorporate"
        strict_order: 1
    write:
      - filepath: "{project}/plans/final-plan_{session}.md"
        description: "Final approved plan"

  write-test:
    read:
      - filepath: "{project}/plans/final-plan_{session}.md"
        description: "Final plan for test creation"
        strict_order: 1
    write:
      - filepath: "src/**/*.test.ts"
        description: "Test files"
        match: test-files

      - filepath: "src/**/*.test.tsx"
        description: "React test files"
        match: test-files

      - filepath: "tests/**/*.py"
        description: "Python test files"
        match: test-files

      - filepath: "{project}/reports/test-summary_{session}.md"
        description: "Summary of tests written"

  review-test:
    read:
      - filepath: "{project}/reports/test-summary_{session}.md"
        description: "Test summary to review"
    write:
      - filepath: "{project}/reports/test-quality-report_{session}.md"
        description: "Test quality assessment"

  write-code:
    read:
      - filepath: "{project}/plans/final-plan_{session}.md"
        description: "Final plan for implementation"
        strict_order: 1
      - filepath: "{project}/codebase-status/codebase-status_{session}.md"
        description: "Codebase status report"
        strict_order: 1
    # Files to modify (edit existing files)
    edit:
      - filepath: "src/**/*.ts"
        description: "TypeScript source files"
        match: source-files
      - filepath: "src/**/*.tsx"
        description: "React components"
        match: source-files
      - filepath: "src/**/*.py"
        description: "Python source files"
        match: source-files
    write:
      - filepath: "{project}/misc/code-test_{session}.md"
        description: "Code implementation notes"

  code-review:
    read:
      - filepath: "{project}/misc/code-test_{session}.md"
        description: "Code notes to review"
        strict_order: 1
    write:
      - filepath: "{project}/reviews/code-review_{session}.md"
        description: "Code review feedback"

  refactor:
    read:
      - filepath: "{project}/reviews/code-review_{session}.md"
        description: "Review feedback to address"
        strict_order: 1
    # Files to modify during refactoring
    edit:
      - filepath: "src/**/*.ts"
        description: "TypeScript files to refactor"
        match: refactor-files
      - filepath: "src/**/*.tsx"
        description: "React components to refactor"
        match: refactor-files
    write:
      - filepath: "{project}/reports/refactor_{session}.md"
        description: "Refactoring summary"

  validate:
    read:
      - filepath: "{project}/reports/refactor_{session}.md"
        description: "Refactoring report to validate"
    # Commands to run (bash)
    bash:
      - command: "npm test"
        description: "Run test suite"
        allow_failure: false
      - command: "npm run lint"
        description: "Check code style"
        allow_failure: true
      - command: "npm run typecheck"
        description: "Verify TypeScript types"
        allow_failure: false
    write:
      - filepath: "{project}/reports/validation_report_{session}.md"
        description: "Validation results"

  commit:
    read:
      - filepath: "{project}/reports/validation_report_{session}.md"
        description: "Validation report to confirm"
    # Skills to invoke
    skill:
      - name: "commit"
        description: "Invoke /commit skill"
    write:
      - filepath: "{project}/reports/commit_{session}.md"
        description: "Commit summary"

# =============================================================================
# FEATURE FLAGS - Enable/disable workflow components
# =============================================================================
features:
  dry_run: false # Simulate without making changes
  strict_phase_order: true # Enforce phase order
  require_deliverables: true # Require deliverables before phase transition
  verbose_logging: false # Extra debug output

# =============================================================================
# ENVIRONMENT OVERRIDES (optional)
# =============================================================================
environments:
  dev:
    features:
      dry_run: true
      verbose_logging: true
  prod:
    features:
      dry_run: false
      verbose_logging: false
      strict_phase_order: true
